name: Feature request
description: Suggest an idea or improvement for Chitin
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Chitin would this affect?
      options:
        - Python compiler (extract / CLI)
        - .phys format / spec
        - Python .phys reader/validator
        - "@autarkis/chitin-web (TypeScript reader / Rapier / Three)"
        - "@autarkis/chitin-lite (browser WASM compiler)"
        - Unity importer
        - Unreal importer
        - Build service (chitin-server)
        - Documentation
        - Other / cross-cutting
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Chitin makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Alternatives you've considered?
    validations:
      required: false
