name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      # Single-thread OpenMP/BLAS: the suspected hang is an open3d/OpenMP
      # deadlock on the 2-core runner. Harmless if that isn't the cause.
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      # Dump native + Python stacks on a fatal signal so a hang is diagnosable.
      PYTHONFAULTHANDLER: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test
        run: pytest -v

  web:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - integrations/web
          - integrations/wasm-lite
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
