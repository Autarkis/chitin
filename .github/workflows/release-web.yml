name: Release Web Package (NPM)

on:
  push:
    tags:
      - "web-v*"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./integrations/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - name: Extract and validate version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#web-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag=$TAG_VERSION pkg=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

  publish-npm:
    needs: test-and-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./integrations/web
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest   # OIDC needs npm >= 11.5.1

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Publish to NPM (OIDC trusted publisher)
        run: npm publish --access public
